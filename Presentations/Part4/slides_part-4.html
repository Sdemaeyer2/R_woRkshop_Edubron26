# 1. The Grammar of Graphics

---

## A theoretical approach to visualisation

.left-column[
&lt;img src="img/Grammar_of_Graphics_cover.jpeg" alt="" width="80%" height="80%" /&gt;
]

.right-column[
Every visualisation is made up of the same components (called layers)

One system (grammar) of building blocks to create (any) visualisation

At the heart of several modern graphical applications:
  - **ggplot2**
  - Tableau
  - Vega-Lite
  - Observable Plot
  
]

---

## Key idea behind the Grammar of Graphics

.pull-left[
.font140[**Layers** of a visualisation:]  

  .data-theme[.bold[data]]  
  .aes-theme[.bold[aesthetics]]  
  .geom-theme[.bold[geometries]]  
  .facet-theme[.bold[facets]]  
  .stat-theme[.bold[statistics]]  
  .coord-theme[.bold[coordinates]]  
  .theme-theme[.bold[themes]]  
]

.pull-right[
![](https://miro.medium.com/max/1400/1*w1RnmuE7VRK9aCAbtW9KAQ.gif)
.footnote[
_Animation by [Thomas de Beus](https://medium.com/tdebeus/think-about-the-grammar-of-graphics-when-improving-your-graphs-18e3744d8d18)_]
]
&lt;br&gt;  
&lt;br&gt;  
&lt;br&gt;  

---
&lt;div class="my-logo-right"&gt; &lt;img src="img/layers of ggplot.png" width="60%"/&gt; &lt;/div&gt;

## Grammar of Graphics: .data-theme[data]

Data is not only raw data, but can also be the results from an analysis
  

|group     |country |gender | mean_age| SD_age| CI_lower| CI_upper|
|:---------|:-------|:------|--------:|------:|--------:|--------:|
|BE Male   |BE      |Male   |       39|   11.0|    17.44|    60.56|
|BE Female |BE      |Female |       41|   13.2|    15.13|    66.87|
|BE Other  |BE      |Other  |       36|    8.2|    19.93|    52.07|
|NL Male   |NL      |Male   |       37|   12.0|    13.48|    60.52|
|NL Female |NL      |Female |       36|   14.0|     8.56|    63.44|
|NL Other  |NL      |Other  |       31|    7.2|    16.89|    45.11|

&lt;br&gt;  

Data has to be 'tidy'

---
&lt;div class="my-logo-right"&gt; &lt;img src="img/layers of ggplot.png" width="60%"/&gt; &lt;/div&gt;

## Grammar of Graphics: .aes-theme[aesthetics]

.pull-left[
- Describe how variables in data are *mapped* to visual properties. For example: 
  - variables mapped on x- and y-axis
  - variable that defines color or size of points
  - ...
  
- Change appearances of aesthetics using `scales`  
]
.pull-right[
&lt;img src="slides_part-4_files/figure-html/unnamed-chunk-4-1.png" alt="" width="720" style="display: block; margin: auto;" /&gt;
]

---
&lt;div class="my-logo-right"&gt; &lt;img src="img/layers of ggplot.png" width="60%"/&gt; &lt;/div&gt;

## Grammar of Graphics: .geom-theme[geometries]

.pull-left[
- Geometrical shapes at the heart of visualisation. For example:
  - boxplot
  - line
  - ...
]

.pull-right[
&lt;img src="slides_part-4_files/figure-html/unnamed-chunk-5-1.png" alt="" width="720" style="display: block; margin: auto;" /&gt;
]
---
&lt;div class="my-logo-right"&gt; &lt;img src="img/layers of ggplot.png" width="60%"/&gt; &lt;/div&gt;

## Grammar of Graphics: .facet-theme[facets]

.pull-left[
- Also called 'small multiples'  

- Define how much panels are shown and how they are arranged
]
.pull-right[
&lt;img src="slides_part-4_files/figure-html/unnamed-chunk-6-1.png" alt="" width="720" style="display: block; margin: auto;" /&gt;

]

---
&lt;div class="my-logo-right"&gt; &lt;img src="img/layers of ggplot.png" width="60%"/&gt; &lt;/div&gt;

## Grammar of Graphics: .stat-theme[statistics]

.pull-left[
- Data is `tidy`, but still in need of some statistical calculations. For example: 
  - Calculate descriptive statistics to create a boxplot
  - Estimate a linear (or other) model to draw a regression line in a scatter plot

- Often implicit done by `ggplot2`
]
.pull-right[
&lt;img src="slides_part-4_files/figure-html/unnamed-chunk-7-1.png" alt="" width="720" style="display: block; margin: auto;" /&gt;
]

---

## Grammar of Graphics 'works' a bit like *a cake* 
.pull-left[
&lt;br&gt;   
&lt;br&gt;    
1. Start by setting up the *foundation* with **`ggplot()`**  

2. Specify *ingredients* (variables) with **`aes()`** and a *flavour* with  **`scales`** 

3. Create *layers* to plot with **`geoms`**  

4. *Style* the cake with **`theme`**  
]

.pull-right[
&lt;img src="img/like_cake.png" alt="" width="70%" height="70%" /&gt;
]
.footnote[
_Slide by [Tanya Shapiro](https://www.tanyashapiro.com/)_
]

## The basics of .UA-red[`ggplot2`]: *data &amp; aesthetics*

``` r
Plot &lt;- ggplot(

## Creating a barplot with .UA-red[`geom_bar()`] or .UA-red[`geom_col()`] 

.pull-left[
**`geom_bar()`**

]

--
.pull-left[.footnotesize[

``` r
ggplot(
  data = penguins,
  aes(
    x = species
    )
  ) +
  geom_bar()

```
]
]
.pull-right[.footnotesize[

``` r
count_data &lt;- 
  penguins %&gt;%
  count(species, name = 'count')

ggplot(
  data = count_data,
  aes(
    x = species,
    y = count
    )
  ) +
  geom_col()
```
]
]

## Creating a barplot with .UA-red[`geom_bar()`]

.pull-left[

Color to bars by the variable `species` by defining an additional *aesthetic*: **`fill`**

.footnotesize[

``` r
ggplot(
  data = penguins,
  aes(
    x = species
    )
  ) +
  geom_bar(
    ## Additional aesthetic: "fill"-scale
    aes(fill = species) 
    )
```
]
]

## Creating a barplot with .UA-red[`geom_bar()`]

.pull-left[

Determine `fill`-colors by adding **`scale_fill_manual()`**

.footnotesize[

``` r
ggplot(
  data = penguins,
  aes(
    x = species
    )
  ) +
  geom_bar(
    aes(fill = species)
    ) +
  ## Specify fill-colors
  scale_fill_manual( 
    values = c("darkorange", "purple", "cyan4") 
    ) 
```
]

## Creating a barplot with .UA-red[`geom_bar()`]

.pull-left[

Add a title, subtitle and change the title of the x-axis using **`labs()`**

.footnotesize[

``` r
ggplot(
  data = penguins,
  aes(
    x = species
    )
  ) +
  geom_bar(
    aes(fill = species)    ) +
  scale_fill_manual(
    values =
      c("darkorange","purple","cyan4")
    ) +
  ## Add title, subtitle and change title of x-axis
  labs(
    title = "Palmer penguins",
    subtitle = "n observations for species",
    x = ""
  )
```
]
]

## Creating a barplot with .UA-red[`geom_bar()`]

.pull-left[

Flip the x- and y-axis using **`coord_flip()`**  

Remove the legend using **`theme(legend.position = "none")`**  

.font60[

``` r
ggplot(
  data = penguins,
  aes(
    x = species
    )
  ) +
  geom_bar(
    aes(fill = species)
    ) +
  scale_fill_manual(
    values = c("darkorange","purple","cyan4")
    ) +
  labs(
    title = "Palmer penguins",
    subtitle = "n observations for species",
    x = ""
  ) +  
  ## Flip x- and y-axis
  coord_flip( ) + 
  theme_minimal( ) +
  ## Remove the legend
  theme(
    legend.position = "none"
  ) 
```
]
]

.pull-right[
&lt;img src="slides_part-4_files/figure-html/unnamed-chunk-36-1.png" alt="" width="360" style="display: block; margin: auto;" /&gt;

## The magic of ggplot2...

.pull-left[

Change a barplot into a lollipop plot by **using two other geoms**: .UA-red[**`geom_point()`**] and .UA-red[**`geom_segment()`**]   

.font50[

``` r
penguins %&gt;% 
  count(species) %&gt;% 
  ggplot(
    aes(
      x = species, 
      y = n)
    ) + 
  geom_point( 
    aes(col = species) 
  ) +  
  geom_segment(  
    aes(
      x = species,
      xend = species, 
      y = 0, 
      yend = n, 
      col = species
      )
    ) + 
```
]

and reuse the remainder of code!  

.font50[

``` r
  scale_colour_manual(
    values = c("darkorange","purple","cyan4")
    ) +
  labs(
    title = "Palmer penguins",
    subtitle = "n observations for species",
    x = ""
  ) +  
  coord_flip( ) + 
  theme_minimal( ) +
  theme(
    legend.position = "none" 
  ) 
```
]
]

## Creating a histogram with .UA-red[`geom_histogram()`]


.pull-left[

Change transparency using argument **`alpha`**   

Remove minor grid lines using argument **`panel.grid.minor = element_blank()`**
.font60[

``` r
ggplot(
  data = penguins,
  aes(
    x = flipper_length_mm,
    fill = species
    )
  ) +
  geom_histogram(
    ## Change transparency of points
    alpha = .7 
  ) +
  scale_y_continuous( 
    breaks = seq(0, 35, 5),
    ) + 
  scale_fill_manual(
    values =
      c("darkorange","purple","cyan4")
    ) +
  labs(
    title = "Palmer penguins",
    subtitle = "Histogram of flipper length",
    x = "Flipper length"
  ) +
  theme_minimal() +
  theme(
    ## Remove minor grid lines
    panel.grid.minor = element_blank()
  ) 
```
]
]

.pull-right[
&lt;img src="slides_part-4_files/figure-html/unnamed-chunk-47-1.png" alt="" width="360" style="display: block; margin: auto;" /&gt;

## Creating a density plot&lt;sup&gt;°&lt;/sup&gt; with .UA-red[`geom_density()`]

.pull-left[

Replace `geom_histogram()` with **`geom_density()`** to create a density plot

.footnotesize[

``` r
ggplot(
  data = penguins,
  aes(
    x = flipper_length_mm,
    fill = species
    )
  ) +
  ## Use geom_density
  geom_density(
    alpha = .7
  ) +
  scale_fill_manual(
    values = c("darkorange","purple","cyan4")
    ) +
  labs(
    title = "Palmer penguins",

# 5. Visualising more than one variable

---

## Visualising more than one variable?
.left-column[
There are many ways to visualise more than one variable... 
The choice depends (among other things) on the type of variables you want to plot: 
- only quantitative variables;  
- only qualitative variables;  
- or a combination of both    

Can you think of an example of each?]

## Creating a barplot of two variables (percentage)

.pull-left[
- Add texts to bars using **`geom_text()`**  
- Add "fill" colors using **`scale_fill_brewer()`**  
- Remove additional space using **`coord_cartesian(expand=FALSE)`**  

.font40[

``` r
penguins %&gt;% 
  ggplot(
    aes(
      x = island,
      fill = species
      )
    ) +
  geom_bar(
    position = position_fill(),
    alpha = .9
    ) +
  geom_text(
    aes(label = ..count..),
    stat = "count",
    colour = "white",
    position = position_fill(vjust = 0.5)
    ) +
  scale_fill_brewer(
    type = "qual", 
    palette = 6
  ) +
  scale_x_discrete(position = "top")+
  scale_y_continuous(breaks = c(0.5, 1)) +
  labs(
    title = "Palmer penguins",
    subtitle = "Distribution of penguin species by island",
    fill = "Species"
  ) +
  coord_cartesian(expand = FALSE) +
  theme_minimal() + 
  theme(
    plot.title = element_text(size = 20, face = "bold"),
    plot.subtitle = element_text(size = 16, face = "italic"),
    axis.title = element_blank(),
    axis.text.x = element_text(size = 14, face = "bold"),
    legend.title = element_text(face = "bold"),
    panel.grid.minor = element_blank(),
    panel.grid.major.x = element_blank()
    )
```

## Chosing colors ...

.pull-left[
- Colors are not meaningless and ... they grab attention  

-  R has several built-in color palettes. The functions `scale_fill_brewer` and  `scale_color_brewer` use palettes of [RColorBrewer](https://r-graph-gallery.com/38-rcolorbrewers-palettes.html). These palettes come in three 'flavours':
  - **sequential**: for ordered data .font80[((for example, scoring low/mediocre/high on a likert scale)]   
  - **qualitative**: for nominal or categorical information .font80[(for example, different islands)] 
  - **diverging**: for ordered data with meaningful mid values .font80[((for example, temperature or change in score)]   
   
]
